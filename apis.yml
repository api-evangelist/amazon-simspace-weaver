aid: amazon-simspace-weaver
name: Amazon SimSpace Weaver
description: >-
  AWS SimSpace Weaver is a managed service that helps you build and run
  large-scale spatial simulations in the AWS Cloud. It provides tools to
  run custom spatial simulation logic at scale and use simulation workloads
  for defense, urban planning, and other real-world system simulations.
